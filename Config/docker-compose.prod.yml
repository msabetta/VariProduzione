version: '3.8'

services:
  db:
    image: mariadb:10.6
    container_name: marioware-mariodb-prod
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: secure_password_here
      MARIADB_DATABASE: marioware
    volumes:
      - db_prod_data:/var/lib/mysql

  api:
    build:
      context: ../VariProduzioneApi
      dockerfile: Dockerfile
    container_name: vari-produzione-api-prod
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=db;Database=marioware;Uid=root;Pwd=secure_password_here;
    depends_on:
      - db

  nginx:
    image: nginx:stable-alpine
    container_name: vari-produzione-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ../vari-produzione-frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - api

volumes:
  db_prod_data:
